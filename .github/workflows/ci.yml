name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test -race ./...
      - name: Fuzz safety boundaries
        run: |
          go test ./pgschema -fuzz=FuzzBatchesContainEveryObjectExactlyOnce -fuzztime=5s -parallel=1
          go test ./internal/graphplan -fuzz=FuzzQuoteIdentifierRoundTrip -fuzztime=5s -parallel=1
          go test ./internal/protocol -fuzz=FuzzResolverAnswerValidation -fuzztime=5s -parallel=1
      - name: Vet
        run: go vet ./...
      - name: Large-schema planner benchmark
        run: go test ./internal/graphplan -run '^$' -bench 'BenchmarkBuildLargeAdditiveSchema/tables_1000$' -benchtime=1x -benchmem
      - name: Reproduce release archives
        run: |
          scripts/build-release.sh v0.0.0-ci.1 /tmp/onwardpg-release-a
          scripts/build-release.sh v0.0.0-ci.1 /tmp/onwardpg-release-b
          diff -u /tmp/onwardpg-release-a/checksums.txt /tmp/onwardpg-release-b/checksums.txt
      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Check Go formatting
        run: bash scripts/check-gofmt.sh
      - name: Check whitespace errors
        run: git diff --check

  postgres:
    name: PostgreSQL ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        postgres: ['14', '15', '16', '17', '18']
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: pgmig
          POSTGRES_PASSWORD: pgmig
          POSTGRES_DB: pgmig
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgmig -d pgmig"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check out pinned Atlas reference
        uses: actions/checkout@v4
        with:
          repository: ariga/atlas
          ref: a5e0aecc2bb64143bf522734f8ad88e04885fca6
          path: .atlas
          fetch-depth: 1
      - name: Build pinned Atlas
        run: (cd .atlas/cmd/atlas && go build -o "$GITHUB_WORKSPACE/.tools/atlas-pinned" .)
      - name: Check out pinned Stripe pg-schema-diff reference
        uses: actions/checkout@v4
        with:
          repository: stripe/pg-schema-diff
          ref: 6208f8f3ceccae8ca634055dc47907a6a864cb76
          path: .stripe-pg-schema-diff
          fetch-depth: 1
      - name: Build and verify pinned Stripe reference
        run: |
          scripts/build-pinned-stripe-reference.sh .stripe-pg-schema-diff .tools/pg-schema-diff-v1.0.7
          go run ./scripts/stripeinventory -source .stripe-pg-schema-diff -output /tmp/stripe-matrix.json
          diff -u parity/stripe-pg-schema-diff-v1.0.7.json /tmp/stripe-matrix.json
      - name: Integration and differential suite
        env:
          ONWARDPG_TEST_DATABASE_URL: postgres://pgmig:pgmig@localhost:5432/pgmig?sslmode=disable
          ATLAS_PINNED_BIN: ${{ github.workspace }}/.tools/atlas-pinned
          STRIPE_PG_SCHEMA_DIFF_BIN: ${{ github.workspace }}/.tools/pg-schema-diff-v1.0.7
          STRIPE_PG_SCHEMA_DIFF_REF: ${{ github.workspace }}/.stripe-pg-schema-diff
        run: go test ./... -count=1
