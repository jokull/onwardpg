name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Test
        run: go test -race ./...
      - name: Fuzz safety boundaries
        run: |
          go test ./pgschema -fuzz=FuzzBatchesContainEveryObjectExactlyOnce -fuzztime=5s -parallel=1
          go test ./internal/graphplan -fuzz=FuzzQuoteIdentifierRoundTrip -fuzztime=5s -parallel=1
          go test ./internal/protocol -fuzz=FuzzResolverAnswerValidation -fuzztime=5s -parallel=1
      - name: Vet
        run: go vet ./...
      - name: Large-schema planner benchmark
        run: go test ./internal/graphplan -run '^$' -bench 'BenchmarkBuildLargeAdditiveSchema/tables_1000$' -benchtime=1x -benchmem
      - name: Reproduce release archives
        run: |
          scripts/build-release.sh v0.0.0-ci.1 /tmp/onwardpg-release-a
          scripts/build-release.sh v0.0.0-ci.1 /tmp/onwardpg-release-b
          diff -u /tmp/onwardpg-release-a/checksums.txt /tmp/onwardpg-release-b/checksums.txt
          diff -u /tmp/onwardpg-release-a/onwardpg.rb /tmp/onwardpg-release-b/onwardpg.rb
      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Check Go formatting
        run: bash scripts/check-gofmt.sh
      - name: Check documentation invariants
        run: node scripts/check-documentation.mjs
      - name: Check documentation website
        run: scripts/test-website-clean-room.sh
      - name: Check whitespace errors
        run: git diff --check

  postgres:
    name: PostgreSQL ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        postgres: ['15', '16', '17', '18']
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: pgmig
          POSTGRES_PASSWORD: pgmig
          POSTGRES_DB: pgmig
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgmig -d pgmig"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check out pinned Atlas reference
        uses: actions/checkout@v4
        with:
          repository: ariga/atlas
          ref: a5e0aecc2bb64143bf522734f8ad88e04885fca6
          path: .atlas
          fetch-depth: 1
      - name: Build pinned Atlas
        run: (cd .atlas/cmd/atlas && go build -o "$GITHUB_WORKSPACE/.tools/atlas-pinned" .)
      - name: Check out pinned Stripe pg-schema-diff reference
        uses: actions/checkout@v4
        with:
          repository: stripe/pg-schema-diff
          ref: 6208f8f3ceccae8ca634055dc47907a6a864cb76
          path: .stripe-pg-schema-diff
          fetch-depth: 1
      - name: Build and verify pinned Stripe reference
        run: |
          scripts/build-pinned-stripe-reference.sh .stripe-pg-schema-diff .tools/pg-schema-diff-v1.0.7
          go run ./scripts/stripeinventory -source .stripe-pg-schema-diff -output /tmp/stripe-matrix.json
          diff -u parity/stripe-pg-schema-diff-v1.0.7.json /tmp/stripe-matrix.json
      - name: Integration and differential suite
        env:
          ONWARDPG_TEST_DATABASE_URL: postgres://pgmig:pgmig@localhost:5432/pgmig?sslmode=disable
          ATLAS_PINNED_BIN: ${{ github.workspace }}/.tools/atlas-pinned
          STRIPE_PG_SCHEMA_DIFF_BIN: ${{ github.workspace }}/.tools/pg-schema-diff-v1.0.7
          STRIPE_PG_SCHEMA_DIFF_REF: ${{ github.workspace }}/.stripe-pg-schema-diff
        run: go test -p 1 ./... -count=1
      - name: Black-box README workflow
        env:
          ONWARDPG_TEST_DATABASE_URL: postgres://pgmig:pgmig@localhost:5432/pgmig?sslmode=disable
        run: scripts/test-readme-workflow.sh
      - name: Black-box documentation receipts
        env:
          ONWARDPG_TEST_DATABASE_URL: postgres://pgmig:pgmig@localhost:5432/pgmig?sslmode=disable
        run: scripts/test-documentation-receipts.sh

  acceptance:
    name: Release acceptance · PostgreSQL ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        postgres: ['15', '16', '17', '18']
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: onwardpg
          POSTGRES_PASSWORD: onwardpg
          POSTGRES_DB: onwardpg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onwardpg -d onwardpg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Compiled-CLI release contract
        env:
          ONWARDPG_ACCEPTANCE_DATABASE_URL: postgres://onwardpg:onwardpg@localhost:5432/onwardpg?sslmode=disable
          ONWARDPG_ACCEPTANCE_ARTIFACT_DIR: ${{ github.workspace }}/.artifacts/acceptance-pg${{ matrix.postgres }}
          ONWARDPG_EXPECTED_POSTGRES_MAJOR: ${{ matrix.postgres }}
        run: scripts/test-acceptance.sh
      - name: Upload acceptance evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-pg${{ matrix.postgres }}
          path: .artifacts/acceptance-pg${{ matrix.postgres }}
          if-no-files-found: error
          retention-days: 7

  pglite-preflight:
    name: PGlite preflight · PostgreSQL 17 subset
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: internal/testkit/pglite-tool/package-lock.json
      - name: Scoped sequential compatibility preflight
        run: scripts/test-pglite-preflight.sh
