name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify tag and repository
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          test -f LICENSE
          go test -race ./...
          go vet ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
          bash scripts/check-gofmt.sh
          git diff --check
      - name: Build deterministic archives and checksums
        run: bash scripts/build-release.sh "$GITHUB_REF_NAME"
      - name: Verify embedded versions
        run: |
          mkdir -p /tmp/onwardpg-release-check
          tar -xzf "dist/onwardpg_${GITHUB_REF_NAME#v}_linux_amd64.tar.gz" -C /tmp/onwardpg-release-check
          binary=$(find /tmp/onwardpg-release-check -type f -name onwardpg -print -quit)
          version_json=$("$binary" version)
          test "$(jq -r '.protocol_version' <<<"$version_json")" = "onwardpg.version/v1"
          test "$(jq -r '.build.version' <<<"$version_json")" = "$GITHUB_REF_NAME"
          test "$(jq -r '.build.commit' <<<"$version_json")" = "$GITHUB_SHA"
          test "$(jq -r '.build.dirty' <<<"$version_json")" = "false"
      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: dist/*
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
